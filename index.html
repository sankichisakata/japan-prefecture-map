<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>47都道府県 特色マップ</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
h1 {
  text-align: center;
  padding: 10px;
  font-size: 16px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  letter-spacing: 2px;
  color: #79c0ff;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
#quiz-btn {
  background: #238636;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.2s;
  white-space: nowrap;
}
#quiz-btn:hover { background: #2ea043; }

/* ===== レイアウト ===== */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}
#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-width: 0;
}
svg { width: 100%; height: 100%; }

/* ===== 地図スタイル ===== */
.prefecture {
  stroke: #0d1117;
  stroke-width: 0.8;
  cursor: pointer;
  transition: fill 0.15s ease;
}
.pref-label {
  font-size: 7px;
  fill: rgba(255,255,255,0.85);
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
  font-weight: bold;
}

/* ===== 情報パネル ===== */
#panel {
  width: 320px;
  background: #161b22;
  border-left: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
#panel-header {
  padding: 14px 18px;
  border-bottom: 1px solid #30363d;
  background: #1c2128;
}
#pref-name { font-size: 22px; font-weight: bold; color: #79c0ff; margin-bottom: 2px; }
#pref-region { font-size: 11px; color: #8b949e; }
#panel-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
#hint {
  padding: 20px;
  text-align: center;
  color: #484f58;
  font-size: 13px;
  line-height: 1.8;
}
.info-card {
  background: #1c2128;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
}
.info-card-title {
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.info-card-icon { font-size: 14px; }
.info-card-content {
  font-size: 12px;
  line-height: 1.7;
  color: #c9d1d9;
}
ruby { ruby-align: center; }
rt { font-size: 0.6em; color: #8b949e; }
.ranking .info-card-title  { color: #ffd700; }
.world   .info-card-title  { color: #56d6f6; }
.agriculture .info-card-title { color: #3fb950; }
.industry .info-card-title { color: #f0883e; }
.history  .info-card-title { color: #d2a8ff; }
.celebrity .info-card-title { color: #ffa657; }

/* ===== ツールチップ ===== */
#tooltip {
  position: absolute;
  background: #1c2128;
  border: 1px solid #388bfd;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  color: #c9d1d9;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 10;
  white-space: nowrap;
}

/* ===== 凡例 ===== */
.legend {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px 16px;
  padding: 6px 12px;
  background: #161b22;
  border-top: 1px solid #30363d;
  font-size: 11px;
  flex-shrink: 0;
}
.legend-item { display: flex; align-items: center; gap: 4px; color: #8b949e; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* ===== クイズオーバーレイ ===== */
#quiz-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
#quiz-overlay.active { display: flex; }
#quiz-box {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 14px;
  width: 100%;
  max-width: 520px;
  padding: 20px;
  max-height: 92dvh;
  overflow-y: auto;
  position: relative;
}
#quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
#quiz-stats { display: flex; flex-direction: column; gap: 3px; }
#quiz-score-line { font-size: 13px; color: #8b949e; }
#quiz-score-num  { color: #ffd700; font-weight: bold; font-size: 16px; }
#quiz-high-line  { font-size: 11px; color: #484f58; }
#quiz-high-num   { color: #ffa657; font-weight: bold; }
#quiz-streak-line {
  font-size: 13px;
  font-weight: bold;
  min-height: 19px;
  transition: all 0.3s;
}
#quiz-close {
  background: none;
  border: 1px solid #30363d;
  color: #8b949e;
  border-radius: 6px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: 12px;
  flex-shrink: 0;
}
#quiz-close:hover { border-color: #f85149; color: #f85149; }
/* タイマーバー */
#quiz-timer-wrap {
  height: 5px;
  background: #21262d;
  border-radius: 3px;
  margin-bottom: 12px;
  overflow: hidden;
}
#quiz-timer-bar {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg,#3fb950,#58a6ff);
  border-radius: 3px;
}
#quiz-timer-bar.warn   { background: linear-gradient(90deg,#ffa657,#f0883e); }
#quiz-timer-bar.danger { background: #f85149; }
/* メタ行 */
#quiz-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
#quiz-type-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #1c2128;
  border: 1px solid #30363d;
  color: #8b949e;
}
#quiz-cat-badge {
  font-size: 11px;
  font-weight: bold;
  border-radius: 20px;
  padding: 2px 10px;
}
#quiz-qnum { font-size: 11px; color: #484f58; margin-left: auto; }
/* 問題文 */
#quiz-question {
  font-size: 14px;
  color: #e6edf3;
  line-height: 1.75;
  background: #1c2128;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 12px;
  border-left: 3px solid #388bfd;
}
#quiz-question .pref-highlight { color: #79c0ff; font-weight: bold; font-size: 18px; }
#quiz-question .info-highlight { color: #c9d1d9; display: block; margin-top: 6px; font-size: 13px; }
/* 選択肢グリッド */
#quiz-choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
#quiz-choices[data-type="B"] { grid-template-columns: 1fr; }
.quiz-choice {
  background: #1c2128;
  border: 2px solid #21262d;
  color: #c9d1d9;
  border-radius: 8px;
  padding: 12px 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  transition: all 0.15s;
  text-align: center;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.4;
}
#quiz-choices[data-type="B"] .quiz-choice {
  text-align: left;
  font-size: 12px;
  font-weight: normal;
  justify-content: flex-start;
  padding: 10px 12px;
}
.quiz-choice:hover:not(:disabled) { border-color: #388bfd; background: #1a2233; transform: translateY(-1px); }
.quiz-choice.correct { background: #1a3a1a; border-color: #3fb950; color: #3fb950; animation: correctPop 0.3s ease; }
.quiz-choice.wrong   { background: #3a1a1a; border-color: #f85149; color: #f85149; animation: wrongShake 0.3s ease; }
.quiz-choice:disabled { cursor: default; transform: none; }
@keyframes correctPop  { 0%{transform:scale(1)} 50%{transform:scale(1.04)} 100%{transform:scale(1)} }
@keyframes wrongShake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
/* 結果 */
#quiz-result {
  text-align: center;
  font-size: 14px;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: none;
  line-height: 1.6;
}
#quiz-result.show { display: block; }
#quiz-result.ok   { background: #1a3a1a; color: #3fb950; }
#quiz-result.ng   { background: #3a1a1a; color: #f85149; }
#quiz-result .bonus-text { font-size: 12px; color: #ffd700; margin-top: 2px; }
/* スコアポップアップ */
.score-pop {
  position: absolute;
  right: 20px;
  top: 16px;
  font-size: 20px;
  font-weight: bold;
  color: #ffd700;
  pointer-events: none;
  animation: floatUp 1.2s ease-out forwards;
  z-index: 20;
}
@keyframes floatUp {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  30%  { opacity:1; transform:translateY(-10px) scale(1.15); }
  100% { opacity:0; transform:translateY(-52px) scale(0.8); }
}
/* 次の問題ボタン */
#quiz-next {
  width: 100%;
  background: #238636;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  display: none;
  transition: background 0.2s, transform 0.1s;
}
#quiz-next.show { display: block; }
#quiz-next:hover  { background: #2ea043; transform: translateY(-1px); }
#quiz-next:active { transform: translateY(0); }
#quiz-auto-next { text-align:center; font-size:12px; color:#484f58; margin-top:6px; display:none; }
#quiz-auto-next.show { display:block; }

/* ===== クイズ画面管理 ===== */
.quiz-screen { display: none; }
.quiz-screen.active { display: block; }

/* モード選択 */
.qms-title { text-align:center; font-size:16px; font-weight:bold; color:#e6edf3; margin-bottom:20px; padding-top:4px; }
.qms-cards { display:flex; flex-direction:column; gap:12px; margin-bottom:14px; }
.mode-card {
  display:flex; align-items:center; gap:14px;
  background:#1c2128; border:2px solid #30363d; border-radius:10px;
  padding:16px; cursor:pointer; transition:all 0.15s; text-align:left; width:100%;
}
.mode-card:hover { border-color:#388bfd; background:#1a2233; }
.mc-icon { font-size:28px; flex-shrink:0; }
.mc-name { font-size:15px; font-weight:bold; color:#e6edf3; margin-bottom:4px; }
.mc-desc { font-size:12px; color:#8b949e; line-height:1.5; }
#qms-close { width:100%; background:none; border:1px solid #30363d; color:#8b949e; border-radius:8px; padding:8px; cursor:pointer; font-size:13px; }
#qms-close:hover { border-color:#f85149; color:#f85149; }

/* ライフ */
#quiz-lives { display:flex; gap:3px; align-items:center; }
.life-icon { font-size:16px; line-height:1; transition:all 0.3s; }
.life-icon.lost { opacity:0.15; filter:grayscale(1); transform:scale(0.85); }

/* ゲームオーバー */
#quiz-gameover-screen { text-align:center; padding:8px 0; }
#go-icon { font-size:52px; margin-bottom:6px; }
#go-title { font-size:22px; font-weight:bold; color:#f85149; margin-bottom:14px; }
#go-stats {
  display:flex; justify-content:center; gap:20px;
  margin-bottom:16px; padding:14px; background:#1c2128; border-radius:10px;
}
.gs-item { font-size:11px; color:#8b949e; }
.gs-num { font-size:22px; font-weight:bold; color:#e6edf3; display:block; margin-top:4px; }
#go-rank-result { font-size:13px; color:#8b949e; margin-bottom:14px; min-height:20px; }
#go-rank-result.ok { color:#3fb950; }
#go-buttons { display:flex; flex-direction:column; gap:8px; }
#go-retry { background:#238636; color:#fff; border:none; border-radius:8px; padding:12px; font-size:14px; font-weight:bold; cursor:pointer; }
#go-retry:hover { background:#2ea043; }
#go-mode-select { background:#1c2128; color:#c9d1d9; border:1px solid #30363d; border-radius:8px; padding:10px; font-size:13px; cursor:pointer; }
#go-mode-select:hover { border-color:#58a6ff; }
#go-close-btn { background:none; color:#8b949e; border:none; font-size:12px; cursor:pointer; margin-top:2px; }
#go-close-btn:hover { color:#f85149; }

/* ===== ランキングパネル ===== */
#rank-panel {
  position:fixed; top:54px; right:12px; width:210px;
  background:#161b22; border:1px solid #30363d; border-radius:10px;
  z-index:50; box-shadow:0 4px 20px rgba(0,0,0,0.6);
}
#rank-header {
  display:flex; align-items:center; padding:10px 12px;
  border-bottom:1px solid #21262d; cursor:pointer; user-select:none; gap:6px;
}
#rank-title { font-size:13px; font-weight:bold; color:#ffd700; flex:1; }
#rank-refresh {
  background:none; border:none; color:#8b949e; cursor:pointer;
  font-size:15px; padding:0 2px; line-height:1;
}
#rank-refresh:hover { color:#e6edf3; }
#rank-toggle { background:none; border:none; color:#8b949e; font-size:10px; cursor:pointer; transition:transform 0.2s; }
#rank-body { max-height:300px; overflow-y:auto; }
#rank-panel.collapsed #rank-body { display:none; }
#rank-panel.collapsed #rank-toggle { transform:rotate(180deg); }
.rank-item {
  display:flex; align-items:center; padding:7px 12px; gap:8px;
  border-bottom:1px solid #1c2128;
}
.rank-item:last-child { border-bottom:none; }
.rank-num { color:#8b949e; width:18px; text-align:right; font-size:11px; flex-shrink:0; }
.rank-num.gold   { color:#ffd700; font-weight:bold; }
.rank-num.silver { color:#b0b8c4; font-weight:bold; }
.rank-num.bronze { color:#cd7f32; font-weight:bold; }
.rank-info { flex:1; min-width:0; }
.rank-pref { color:#e6edf3; font-size:12px; font-weight:bold; }
.rank-time { color:#484f58; font-size:10px; }
.rank-score { color:#ffd700; font-weight:bold; font-size:13px; flex-shrink:0; }
#rank-empty { text-align:center; color:#484f58; padding:16px 12px; font-size:12px; }
#rank-loading { text-align:center; color:#484f58; padding:12px; font-size:12px; }

/* ===== ドラッグハンドル ===== */
#panel-drag-handle { display: none; } /* デスクトップでは非表示 */

/* ===== モバイル対応 ===== */
@media (max-width: 700px) {
  #main { flex-direction: column; }
  #panel {
    width: 100%;
    border-left: none;
    border-top: none;
    height: 45dvh;       /* max-height → height に変更してJSで制御 */
    min-height: 52px;
    overflow: hidden;
  }
  #panel.dragging { transition: none; }
  #panel-drag-handle {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 7px 0 3px;
    cursor: grab;
    touch-action: none;
    background: #161b22;
    border-top: 1px solid #30363d;
    flex-shrink: 0;
  }
  #panel-drag-handle:active { cursor: grabbing; }
  .drag-bar {
    width: 36px;
    height: 4px;
    background: #484f58;
    border-radius: 2px;
  }
  #hint { display: none; }  /* スマホではヒントテキスト不要 */
  #panel-body { padding: 10px 12px; }
  #panel-header { padding: 10px 12px; }
  #pref-name { font-size: 18px; }
  .info-card { padding: 10px; margin-bottom: 8px; }
  .info-card-content { font-size: 11px; }
  .legend { gap: 4px 10px; font-size: 10px; padding: 4px 8px; }
  h1 { font-size: 13px; padding: 8px; }
  #quiz-btn { font-size: 11px; padding: 5px 10px; }
  #quiz-choices { grid-template-columns: 1fr 1fr; gap: 8px; }
  .quiz-choice { font-size: 12px; padding: 10px 6px; }
  #quiz-box { padding: 14px; }
  #rank-panel { width: 160px; top: 50px; right: 8px; }
  #rank-panel.collapsed #rank-body { display: none; }
  .rank-pref { font-size: 11px; }
  .rank-score { font-size: 12px; }
}
@media (max-width: 400px) {
  .pref-label { font-size: 5.5px; }
  #rank-panel { width: 140px; }
}
</style>
</head>
<body>
<h1>
  <span>47都道府県 特色マップ</span>
  <button id="quiz-btn">🎯 クイズ</button>
</h1>
<div id="main">
  <div id="map-container">
    <div id="tooltip"></div>
    <svg id="map"></svg>
  </div>
  <div id="panel">
    <div id="panel-drag-handle"><div class="drag-bar"></div></div>
    <div id="panel-header">
      <div id="pref-name">都道府県を選択</div>
      <div id="pref-region">地図をタップしてください</div>
    </div>
    <div id="panel-body">
      <div id="hint">🗾 都道府県をタップすると<br>詳細情報が表示されます</div>
      <div id="info-cards" style="display:none;">
        <div class="info-card ranking">
          <div class="info-card-title"><span class="info-card-icon">🏆</span>全国ランキング</div>
          <div class="info-card-content" id="info-ranking"></div>
        </div>
        <div class="info-card world">
          <div class="info-card-title"><span class="info-card-icon">🌍</span>世界的に有名なこと</div>
          <div class="info-card-content" id="info-world"></div>
        </div>
        <div class="info-card agriculture">
          <div class="info-card-title"><span class="info-card-icon">🌾</span>農業特産</div>
          <div class="info-card-content" id="info-agriculture"></div>
        </div>
        <div class="info-card industry">
          <div class="info-card-title"><span class="info-card-icon">🏭</span>工業・産業</div>
          <div class="info-card-content" id="info-industry"></div>
        </div>
        <div class="info-card history">
          <div class="info-card-title"><span class="info-card-icon">🏯</span>歴史</div>
          <div class="info-card-content" id="info-history"></div>
        </div>
        <div class="info-card celebrity">
          <div class="info-card-title"><span class="info-card-icon">👤</span>著名人</div>
          <div class="info-card-content" id="info-celebrity"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="legend" id="legend"></div>

<!-- ランキングパネル（右上固定） -->
<div id="rank-panel">
  <div id="rank-header">
    <span id="rank-title">🏆 ランキング</span>
    <button id="rank-refresh" title="更新">↺</button>
    <button id="rank-toggle">▲</button>
  </div>
  <div id="rank-body">
    <div id="rank-loading">読み込み中…</div>
  </div>
</div>

<!-- クイズオーバーレイ -->
<div id="quiz-overlay">
  <div id="quiz-box">

    <!-- ① モード選択画面 -->
    <div id="quiz-mode-screen" class="quiz-screen active">
      <div class="qms-title">47都道府県クイズ</div>
      <div class="qms-cards">
        <button class="mode-card" id="mode-ranking-btn">
          <div class="mc-icon">🏆</div>
          <div>
            <div class="mc-name">ランキングモード</div>
            <div class="mc-desc">ミス3回でゲームオーバー<br>スコアがランキングに登録される</div>
          </div>
        </button>
        <button class="mode-card" id="mode-practice-btn">
          <div class="mc-icon">📚</div>
          <div>
            <div class="mc-name">練習モード</div>
            <div class="mc-desc">ミス無制限 / ランキング登録なし<br>気軽に都道府県を学ぼう</div>
          </div>
        </button>
      </div>
      <button id="qms-close">✕ 閉じる</button>
    </div>

    <!-- ② ゲーム画面 -->
    <div id="quiz-game-screen" class="quiz-screen">
      <div id="quiz-header">
        <div id="quiz-stats">
          <div id="quiz-score-line">スコア: <span id="quiz-score-num">0</span>pt</div>
          <div id="quiz-high-line">ハイスコア: <span id="quiz-high-num">0</span>pt</div>
          <div id="quiz-streak-line"></div>
        </div>
        <div id="quiz-lives"></div>
        <button id="quiz-close">✕</button>
      </div>
      <div id="quiz-timer-wrap"><div id="quiz-timer-bar"></div></div>
      <div id="quiz-meta">
        <span id="quiz-type-badge"></span>
        <span id="quiz-cat-badge"></span>
        <span id="quiz-qnum"></span>
      </div>
      <div id="quiz-question"></div>

function stripHtml(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || "";
}

const prefRegion= document.getElementById("pref-region");

function resetPanel() {
  if (selectedEl) {
    const prevName = d3.select(selectedEl).datum().properties.nam_ja || d3.select(selectedEl).datum().properties.nam;
    const prevReg  = prefectureData[prevName]?.region;

// ===== D3 地図描画 =====
let projection, pathGen;

async function init() {
  const geojson = await d3.json(
    "https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson"
  );
  const container = document.getElementById("map-container");
  const w = container.clientWidth;
  const h = container.clientHeight;

  projection = d3.geoMercator()
    .center([137, 36])
    .scale(1500)
    .translate([w * 0.45, h * 0.5]);
  pathGen = d3.geoPath().projection(projection);

  const g = svg.append("g");

  g.selectAll("path")
    .data(geojson.features)
    .join("path")
    .attr("class", "prefecture")
    .attr("d", pathGen)
    .style("fill", d => {
      const name = d.properties.nam_ja || d.properties.nam;
      return regionColors[prefectureData[name]?.region] || "#1f6feb";
    })
    .on("mousemove", function(event, d) {
      const name = d.properties.nam_ja || d.properties.nam;
      tooltip.style.opacity = "1";
      tooltip.style.left = (event.offsetX + 12) + "px";
      tooltip.style.top  = (event.offsetY - 10) + "px";
      tooltip.textContent = name;
      if (this !== selectedEl) {
        const reg = prefectureData[name]?.region;
        d3.select(this).style("fill", regionHover[reg] || "#388bfd");
      }
    })
    .on("mouseleave", function(event, d) {
      tooltip.style.opacity = "0";
      if (this !== selectedEl) {
        const name = d.properties.nam_ja || d.properties.nam;
        const reg  = prefectureData[name]?.region;
        d3.select(this).style("fill", regionColors[reg] || "#1f6feb");
      }
    })
    .on("click", function(event, d) {
      event.stopPropagation();
      const name = d.properties.nam_ja || d.properties.nam;
      if (selectedEl) {
        const prevName = d3.select(selectedEl).datum().properties.nam_ja || d3.select(selectedEl).datum().properties.nam;
        const prevReg  = prefectureData[prevName]?.region;
        d3.select(selectedEl).style("fill", regionColors[prevReg] || "#1f6feb");
      }
      selectedEl = this;
      d3.select(this).style("fill", "#58a6ff");
      if (prefectureData[name]) {
        updatePanel(name, prefectureData[name]);
      }
    });

  // 頭文字ラベル
  g.selectAll("text.pref-label")
    .data(geojson.features)
    .join("text")
    .attr("class", "pref-label")
    .attr("x", d => pathGen.centroid(d)[0])
    .attr("y", d => pathGen.centroid(d)[1])
    .text(d => {
      const name = d.properties.nam_ja || d.properties.nam;
      return name ? name[0] : "";
    });

  // ズーム（ピンチ対応）
  const zoom = d3.zoom()
    .scaleExtent([0.5, 8])
    .on("zoom", event => g.attr("transform", event.transform));
  svg.call(zoom);

  // 地図の空白（海）タップで選択解除
  svg.on("click", function(event) {
    if (event.target === this || event.target.tagName === "svg") {
      resetPanel();
    }
  });
}

const allPrefs = Object.keys(prefectureData);
const TIMER_SEC = 15;
const MAX_LIVES = 3;
const qs = {
  score: 0, total: 0, correct: 0, streak: 0, bestStreak: 0,
  mode: "practice", lives: MAX_LIVES,
  highScore: parseInt(localStorage.getItem("jpMapHighScore") || "0"),
  timer: null, timeLeft: TIMER_SEC, answered: false, autoTimer: null,
};

const randItem = arr => arr[Math.floor(Math.random() * arr.length)];

// ----- 画面切り替え -----
function showScreen(name) {
  document.querySelectorAll(".quiz-screen").forEach(el => el.classList.remove("active"));
  document.getElementById(`quiz-${name}-screen`).classList.add("active");
}

// ----- ライフ表示 -----
function updateLives() {
  const el = document.getElementById("quiz-lives");
  if (qs.mode !== "ranking") { el.innerHTML = ""; return; }
  el.innerHTML = Array.from({ length: MAX_LIVES }, (_, i) =>
    `<span class="life-icon${i >= qs.lives ? " lost" : ""}">❤️</span>`
  ).join("");
}

// ----- 問題生成 -----
function genTypeA() {
  const cat     = randItem(quizCategories);
  const correct = randItem(allPrefs);
  const wrongs  = allPrefs.filter(p => p !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
  const raw     = stripHtml(prefectureData[correct][cat.key] || "");
  const excerpt = raw.length > 65 ? raw.slice(0, 65) + "…" : raw;
  return {
    type: "A", cat, correct, excerpt,
    choices: [correct, ...wrongs].sort(() => Math.random() - 0.5),
    isCorrect: c => c === correct,
    choiceLabel: c => c,
    correctLabel: correct,
  };
}

function genTypeB() {
  const cat         = randItem(quizCategories);
  const correct     = randItem(allPrefs);
  const wrongs      = allPrefs.filter(p => p !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
  const correctText = stripHtml(prefectureData[correct][cat.key] || "");
  const allChoices  = [
    { text: correctText },
    ...wrongs.map(p => ({ text: stripHtml(prefectureData[p][cat.key] || "") })),
  ].sort(() => Math.random() - 0.5);
  const trim = t => t.length > 48 ? t.slice(0, 48) + "…" : t;
  return {
    type: "B", cat, correct, excerpt: null,
    prefLabel: correct,
    choices: allChoices.map(c => c.text),
    isCorrect: t => t === correctText,
    choiceLabel: t => trim(t),
    correctLabel: trim(correctText),
  };
}

function generateQuiz() { return Math.random() < 0.5 ? genTypeA() : genTypeB(); }

// ----- タイマー -----
function startTimer() {
  clearInterval(qs.timer);
  qs.timeLeft = TIMER_SEC;
  const bar = document.getElementById("quiz-timer-bar");
  bar.style.transition = "none";
  bar.style.width = "100%";
  bar.className = "";
  void bar.offsetWidth;
  bar.style.transition = `width ${TIMER_SEC}s linear`;
  bar.style.width = "0%";
  qs.timer = setInterval(() => {
    qs.timeLeft--;
    if      (qs.timeLeft <= 5) bar.className = "danger";
    else if (qs.timeLeft <= 8) bar.className = "warn";
    if (qs.timeLeft <= 0) { clearInterval(qs.timer); if (!qs.answered) timeUp(); }
  }, 1000);
}

function stopTimer() {
  clearInterval(qs.timer);
  const bar = document.getElementById("quiz-timer-bar");
  bar.style.transition = "none";
}

function timeUp() {
  qs.answered = true;
  qs.total++;
  qs.streak = 0;
  updateStreakDisplay();
  if (qs.mode === "ranking") { qs.lives--; updateLives(); }

  const choicesEl = document.getElementById("quiz-choices");
  choicesEl.querySelectorAll(".quiz-choice").forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === "1") b.classList.add("correct");
  });
  const correctBtn = choicesEl.querySelector("[data-correct='1']");
  const result = document.getElementById("quiz-result");
  result.innerHTML = `⏱ 時間切れ！正解は「<strong>${correctBtn ? correctBtn.textContent : "？"}</strong>」でした`;
  result.className = "quiz-result show ng";
  updateScoreDisplay();

  if (qs.mode === "ranking" && qs.lives <= 0) {
    setTimeout(() => gameOver(), 2200);
  } else {
    autoAdvance(2500);
  }
}

function autoAdvance(ms) {
  clearTimeout(qs.autoTimer);
  const el = document.getElementById("quiz-auto-next");
  let count = Math.ceil(ms / 1000);
  el.textContent = `${count}秒後に次の問題へ…`;
  el.classList.add("show");
  const tick = setInterval(() => { count--; count > 0 ? el.textContent = `${count}秒後に次の問題へ…` : clearInterval(tick); }, 1000);
  qs.autoTimer = setTimeout(() => { el.classList.remove("show"); renderQuiz(); }, ms);
}

// ----- 表示更新 -----
function updateStreakDisplay() {
  const el = document.getElementById("quiz-streak-line");
  if      (qs.streak >= 10) el.textContent = `⚡ ${qs.streak}コンボ！！！`;
  else if (qs.streak >= 7)  el.textContent = `💥 ${qs.streak}コンボ！！`;
  else if (qs.streak >= 5)  el.textContent = `🔥 ${qs.streak}コンボ！`;
  else if (qs.streak >= 3)  el.textContent = `🔥 ${qs.streak}コンボ`;
  else el.textContent = qs.streak > 0 ? `✓ ${qs.streak}連続正解` : "";
}

function updateScoreDisplay() {
  document.getElementById("quiz-score-num").textContent = qs.score;
  document.getElementById("quiz-high-num").textContent  = qs.highScore;
  document.getElementById("quiz-qnum").textContent      = qs.total > 0 ? `Q${qs.total}` : "";
}

function showScorePop(text) {
  const el = document.createElement("div");
  el.className = "score-pop";
  el.textContent = text;
  document.getElementById("quiz-box").appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// ----- ゲームオーバー -----
async function gameOver() {
  clearInterval(qs.timer);
  clearTimeout(qs.autoTimer);
  showScreen("gameover");

  document.getElementById("go-score").textContent   = qs.score;
  document.getElementById("go-correct").textContent = qs.correct;
  document.getElementById("go-streak").textContent  = qs.bestStreak;

  const rankEl = document.getElementById("go-rank-result");
  rankEl.className = "";
  rankEl.textContent = "ランキングに登録中…";

  try {
    await saveHighScore(qs.score);
    rankEl.textContent = "✓ ランキングに登録されました";
    rankEl.className = "ok";
    loadRanking();
  } catch {
    rankEl.textContent = "（オフライン：ランキング登録できませんでした）";
  }
}

// ----- メインゲームループ -----
function renderQuiz() {
  clearTimeout(qs.autoTimer);
  document.getElementById("quiz-auto-next").classList.remove("show");
  qs.answered = false;
  const q = generateQuiz();

  document.getElementById("quiz-type-badge").textContent = q.type === "A" ? "どの都道府県？" : "どの情報が正しい？";

  const catBadge = document.getElementById("quiz-cat-badge");
  catBadge.textContent = `${q.cat.emoji} ${q.cat.label}`;
  catBadge.style.cssText = `background:${q.cat.color}22;color:${q.cat.color};border:1px solid ${q.cat.color}44;`;

  const qEl = document.getElementById("quiz-question");
  if (q.type === "A") {
    qEl.innerHTML = `次の【${q.cat.label}】を持つ都道府県はどこ？<span class="info-highlight">「${q.excerpt}」</span>`;
  } else {
    qEl.innerHTML = `<span class="pref-highlight">${q.prefLabel}</span>の【${q.cat.label}】として正しいのはどれ？`;
  }

  const choicesEl = document.getElementById("quiz-choices");
  choicesEl.innerHTML = "";
  choicesEl.dataset.type = q.type;
  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "quiz-choice";
    btn.textContent = q.choiceLabel(choice);
    if (q.isCorrect(choice)) btn.dataset.correct = "1";
    btn.addEventListener("click", () => {
      if (qs.answered) return;
      qs.answered = true;
      qs.total++;
      stopTimer();
      choicesEl.querySelectorAll(".quiz-choice").forEach(b => {
        b.disabled = true;
        if (b.dataset.correct === "1") b.classList.add("correct");
      });
      const result  = document.getElementById("quiz-result");
      const nextBtn = document.getElementById("quiz-next");

      if (q.isCorrect(choice)) {
        btn.classList.add("correct");
        qs.correct++;
        qs.streak++;
        if (qs.streak > qs.bestStreak) qs.bestStreak = qs.streak;
        const timeBonus   = Math.max(0, qs.timeLeft);
        const streakBonus = qs.streak >= 10 ? 10 : qs.streak >= 5 ? 5 : qs.streak >= 3 ? 3 : 0;
        const gained      = 10 + timeBonus + streakBonus;
        qs.score += gained;
        if (qs.score > qs.highScore) {
          qs.highScore = qs.score;
          localStorage.setItem("jpMapHighScore", qs.highScore);
        }
        updateStreakDisplay();
        const bonusParts = [];
        if (timeBonus   > 0) bonusParts.push(`タイムボーナス +${timeBonus}`);
        if (streakBonus > 0) bonusParts.push(`コンボボーナス +${streakBonus}`);
        const bonusLine = bonusParts.length ? `<div class="bonus-text">${bonusParts.join(" / ")}</div>` : "";
        result.innerHTML = `✓ 正解！ +${gained}pt${bonusLine}`;
        result.className = "quiz-result show ok";
        showScorePop(`+${gained}pt`);
        updateScoreDisplay();
        nextBtn.classList.add("show");
      } else {
        btn.classList.add("wrong");
        qs.streak = 0;
        updateStreakDisplay();
        if (qs.mode === "ranking") {
          qs.lives--;
          updateLives();
        }
        result.innerHTML = `✗ 不正解… 正解は「<strong>${q.correctLabel}</strong>」でした`;
        result.className = "quiz-result show ng";
        updateScoreDisplay();

        if (qs.mode === "ranking" && qs.lives <= 0) {
          setTimeout(() => gameOver(), 1800);
        } else {
          nextBtn.classList.add("show");
        }
      }
    });
    choicesEl.appendChild(btn);
  });

  document.getElementById("quiz-result").className = "quiz-result";
  document.getElementById("quiz-next").classList.remove("show");
  updateScoreDisplay();
  startTimer();
}

function resetQuiz() {
  clearInterval(qs.timer);
  clearTimeout(qs.autoTimer);
  qs.score = 0; qs.total = 0; qs.correct = 0; qs.streak = 0; qs.bestStreak = 0;
  qs.lives = MAX_LIVES; qs.answered = false;
  document.getElementById("quiz-streak-line").textContent = "";
  document.getElementById("quiz-auto-next").classList.remove("show");
  updateScoreDisplay();
  updateLives();
}

function startGame(mode) {
  qs.mode = mode;
  resetQuiz();
  showScreen("game");
  renderQuiz();
}

function closeOverlay() {
  clearInterval(qs.timer);
  clearTimeout(qs.autoTimer);
  document.getElementById("quiz-overlay").classList.remove("active");
  showScreen("mode"); // 次回開いた時のためにモード選択に戻す
}

// ----- ランキング -----
async function loadRanking() {
  const listEl = document.getElementById("rank-body");
  listEl.innerHTML = '<div id="rank-loading">読み込み中…</div>';
  try {
    const res = await fetch("/api/ranking");
    if (!res.ok) throw new Error();
    const { ranking } = await res.json();
    renderRanking(ranking);
  } catch {
    listEl.innerHTML = '<div id="rank-empty">データなし</div>';
  }
}

function renderRanking(ranking) {
  const listEl = document.getElementById("rank-body");
  if (!ranking || ranking.length === 0) {
    listEl.innerHTML = '<div id="rank-empty">まだ記録がありません<br>クイズを始めよう！</div>';
    return;
  }
  const medals = ["gold", "silver", "bronze"];
  listEl.innerHTML = ranking.map((r, i) => `
    <div class="rank-item">
      <div class="rank-num ${medals[i] || ""}">${r.rank}</div>
      <div class="rank-info">
        <div class="rank-pref">${r.pref}</div>
        <div class="rank-time">${r.time}</div>
      </div>
      <div class="rank-score">${r.score}pt</div>
    </div>
  `).join("");
}

// ----- API -----
async function loadHighScore() {
  try {
    const res = await fetch("/api/score");
    if (res.ok) {
      const { highScore } = await res.json();
      if (highScore > qs.highScore) {
        qs.highScore = highScore;
        localStorage.setItem("jpMapHighScore", highScore);
        updateScoreDisplay();
      }
    }
  } catch { /* オフライン時はlocalStorageの値を使用 */ }
}

async function saveHighScore(score) {
  localStorage.setItem("jpMapHighScore", Math.max(score, qs.highScore));
  const res = await fetch("/api/score", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ score }),
  });
  if (!res.ok) throw new Error("save failed");
}

// ----- パネルドラッグ（モバイルのみ） -----
(function initPanelDrag() {
  if (window.innerWidth > 700) return;

  const panel  = document.getElementById("panel");
  const handle = document.getElementById("panel-drag-handle");
  const h1H    = document.querySelector("h1").offsetHeight;
  const minH   = 52;                                    // ハンドル+ヘッダーのみ
  const defH   = Math.round(window.innerHeight * 0.45); // デフォルト45%
  const maxH   = window.innerHeight - h1H - 4;          // ほぼフル

  // 初期高さを数値で設定
  panel.style.height = defH + "px";

  let startY = 0, startH = 0, isDragging = false;

  function snapTo(targetH) {
    panel.classList.remove("dragging");
    panel.style.transition = "height 0.28s cubic-bezier(0.4,0,0.2,1)";
    panel.style.height = targetH + "px";
    setTimeout(() => { panel.style.transition = ""; }, 300);
  }

  handle.addEventListener("touchstart", e => {
    isDragging = true;
    startY = e.touches[0].clientY;
    startH = panel.getBoundingClientRect().height;
    panel.classList.add("dragging");
    e.preventDefault();
  }, { passive: false });

  document.addEventListener("touchmove", e => {
    if (!isDragging) return;
    const dy  = startY - e.touches[0].clientY; // 上方向が正
    const newH = Math.max(minH, Math.min(startH + dy, maxH));
    panel.style.height = newH + "px";
    e.preventDefault();
  }, { passive: false });

  document.addEventListener("touchend", () => {
    if (!isDragging) return;
    isDragging = false;
    const h = panel.getBoundingClientRect().height;
    // スナップ閾値
    if (h > (defH + maxH) / 2) {
      snapTo(maxH);
    } else if (h > (minH + defH) / 2) {
      snapTo(defH);
    } else {
      snapTo(minH);
    }
  });
})();
</script>
